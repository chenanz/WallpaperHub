name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5 && chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Find APK files
      id: find_apk
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f 2>/dev/null
        APK_PATH=$(find app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | head -1)
        echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
        if [ -n "$APK_PATH" ]; then
          echo "Found APK: $APK_PATH"
          APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || echo "0")
          echo "APK size: $(($APK_SIZE / 1024))KB"
        else
          echo "NO APK FOUND - listing app/build/outputs:"
          find app/build/outputs -type f 2>/dev/null | head -20
          echo "ERROR: No APK was produced"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wallpaperhub-debug-apk
        path: app/build/outputs/apk/**/*.apk
        retention-days: 90

    - name: Upload APK to Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/**/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
