name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Debug - show project structure
      run: |
        echo "=== Root files ==="
        ls -la
        echo "=== App dir ==="
        ls -la app/ 2>/dev/null || echo "No app dir"
        echo "=== Gradle files ==="
        cat build.gradle.kts
        echo "=== App build.gradle.kts ==="
        cat app/build.gradle.kts

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build_output.log

    - name: Diagnose + post to issue
      if: always()
      run: |
        echo "=== APK search ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "NO_APK_ANYWHERE"
        echo "=== app/build structure ==="
        find app/build -type f 2>/dev/null | head -50 || echo "NO_BUILD_DIR"
        echo "=== build_output last 100 ==="
        tail -100 build_output.log 2>/dev/null || echo "No log"

    - name: Post full diagnostics to issue
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const { execSync } = require('child_process');
          let apkFind = '', buildDir = '', logTail = '';
          try { apkFind = execSync('find . -name "*.apk" -type f 2>/dev/null || echo "NO_APK"').toString(); } catch(e) { apkFind = 'Error'; }
          try { buildDir = execSync('find app/build -type f 2>/dev/null | head -30 || echo "NO_BUILD"').toString(); } catch(e) { buildDir = 'No build dir'; }
          try { logTail = require('fs').readFileSync('build_output.log', 'utf8').split('\\n').slice(-80).join('\\n'); } catch(e) { logTail = 'No log'; }
          const body = `## 🔍 Build Diagnostics\n\n### APK Search\n\`\`\`\n${apkFind}\n\`\`\`\n\n### Build Dir\n\`\`\`\n${buildDir}\n\`\`\`\n\n### Build Log (last 80 lines)\n<details><summary>Click</summary>\n\n\`\`\`\n${logTail}\n\`\`\`\n</details>`;
          try {
            const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, labels: 'ci-build-log', state: 'open' });
            let issue_number;
            if (issues.data.length > 0) { issue_number = issues.data[0].number; }
            else { const c = await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: 'CI Build Log', labels: ['ci-build-log'], body: '' }); issue_number = c.data.number; }
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });
          } catch(e) { core.setFailed('Issue post failed: ' + e.message); }

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: wallpaperhub-debug-apk
        path: |
          **/*.apk
        retention-days: 90
        if-no-files-found: warn

    - name: Upload APK to Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
