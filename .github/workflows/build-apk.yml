name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      continue-on-error: true
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log

    - name: Write errors to job summary
      if: always()
      run: |
        {
          echo "# Build Diagnostics"
          echo ""
          echo "## Error Lines (e:)"
          echo '```'
          grep "^e:" build_output.log 2>/dev/null | head -30 || echo "none"
          echo '```'
          echo ""
          echo "## Full Log (last 150 lines)"
          echo '```'
          tail -150 build_output.log 2>/dev/null || echo "no log"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Find APK files
      if: always()
      run: |
        echo "### APK Search" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        find . -name "*.apk" -type f 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "NONE" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Upload APK to Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Fail if build failed
      run: |
        if grep -q "BUILD FAILED" build_output.log 2>/dev/null; then
          exit 1
        fi
