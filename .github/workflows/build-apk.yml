name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5 && chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      id: build
      continue-on-error: true
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log

    - name: Write errors to summary
      if: always()
      run: |
        RESULT="${{ steps.build.outcome }}"
        ERRORS=$(grep -E "^e:" build_output.log 2>/dev/null | head -60 || echo "none")
        {
          echo "# Build Result: $RESULT"
          echo ""
          echo "### Kotlin Compiler Errors"
          echo "\`\`\`"
          echo "$ERRORS"
          echo "\`\`\`"
          echo ""
          echo "### Log Tail"
          echo "\`\`\`"
          tail -60 build_output.log 2>/dev/null
          echo "\`\`\`"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Find and upload APK
      if: steps.build.outcome == 'success'
      run: |
        find . -name "*.apk" -type f
      
    - name: Fail if build actually failed
      if: steps.build.outcome != 'success'
      run: |
        echo "Gradle build failed - see Step Summary for errors"
        exit 1

    - name: Upload APK to Release
      if: startsWith(github.ref, 'refs/tags/v') && steps.build.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/**/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
