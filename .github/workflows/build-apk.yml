name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build_output.log

    - name: Search for APK
      if: always()
      run: |
        echo "=== Find APK ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo "=== Build dir ==="
        find app/build -type f 2>/dev/null | head -50
        echo "=== Project tree ==="
        find . -maxdepth 2 -type f -name "*.gradle.kts" -o -name "*.properties" | head -20

    - name: Upload build log as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_output.log
        retention-days: 7

    - name: Upload APK artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: wallpaperhub-debug-apk
        path: |
          **/*.apk
        retention-days: 90
        if-no-files-found: warn

    - name: Create GitHub Release with APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
