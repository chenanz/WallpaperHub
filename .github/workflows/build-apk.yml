name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5 && chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      continue-on-error: true
      id: build_step
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log

    - name: Post errors to Issue
      if: always()
      run: |
        ERRORS=$(grep -E "^e:" build_output.log 2>/dev/null | head -60 || echo "No e: lines")
        TAIL_LOG=$(tail -100 build_output.log 2>/dev/null || echo "No log")
        STATUS="${{ steps.build_step.outcome }}"
        BODY="## Build: ${STATUS}\n\n### Errors\n\`\`\`\n${ERRORS}\n\`\`\`\n\n### Log Tail\n\`\`\`\n${TAIL_LOG}\n\`\`\`"
        PAYLOAD=$(printf '{"body":"%s"}' "$(echo "$BODY" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')")
        curl -s -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/chenanz/WallpaperHub/issues/1/comments" \
          -d "$PAYLOAD" || true

    - name: Upload APK to Release
      if: startsWith(github.ref, 'refs/tags/v') && steps.build_step.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
