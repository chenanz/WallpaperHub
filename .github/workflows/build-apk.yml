name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5 && chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Dump outputs tree
      run: |
        echo "=== app/build/outputs ==="
        find app/build/outputs -type f 2>/dev/null | head -30
        echo ""
        echo "=== ALL .apk files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo ""
        echo "=== FULL build tree (top 4 levels) ==="
        find app/build -maxdepth 4 -type d 2>/dev/null | head -40

    - name: Upload APK artifact (debug)
      uses: actions/upload-artifact@v4
      with:
        name: wallpaperhub-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 90
        if-no-files-found: error

    - name: Upload APK artifact (release)
      uses: actions/upload-artifact@v4
      with:
        name: wallpaperhub-release  
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90
        if-no-files-found: warn

    - name: Create Release with debug APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}