name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      continue-on-error: true
      id: build_step
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log

    - name: Post build errors to Issue
      if: always()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ERRORS=$(grep -E "^e:|error:|ERROR" build_output.log 2>/dev/null | head -40 || echo "No error lines found")
        TAIL_LOG=$(tail -80 build_output.log 2>/dev/null || echo "No log available")
        BUILD_STATUS="${{ steps.build_step.outcome }}"
        
        ISSUE_NUMBER=$(gh issue list --repo chenanz/WallpaperHub --label ci-build --limit 1 --json number -q '.[0].number' 2>/dev/null || echo "")
        
        if [ -z "$ISSUE_NUMBER" ]; then
          ISSUE_NUMBER=$(gh issue create --repo chenanz/WallpaperHub --title "CI Build Log" --label "ci-build" --body "Auto-created for build logs" --json number -q '.number' 2>/dev/null || echo "1")
        fi
        
        {
          echo "## Build Result: ${BUILD_STATUS}"
          echo ""
          echo "### Error Lines"
          echo '```'
          echo "$ERRORS"
          echo '```'
          echo ""
          echo "### Build Log (last 80 lines)"
          echo '```'
          echo "$TAIL_LOG"
          echo '```'
        } > /tmp/comment.md
        
        gh issue comment "${ISSUE_NUMBER}" --repo chenanz/WallpaperHub --body-file /tmp/comment.md 2>&1 || echo "Failed to post comment"

    - name: Upload APK to Release
      if: startsWith(github.ref, 'refs/tags/v') && steps.build_step.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
