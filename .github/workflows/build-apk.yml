name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      id: gradle_build
      run: |
        set -o pipefail
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log

    - name: Write build errors to summary
      if: always()
      run: |
        {
          echo "## Build Result"
          echo "Status: ${{ steps.gradle_build.outcome }}"
          echo ""
          echo "### Kotlin Compiler Errors"
          grep -n "e:" build_output.log 2>/dev/null | head -30 || echo "No e: lines found"
          echo ""
          echo "### Build Log (last 200 lines)"
          echo '```'
          tail -200 build_output.log 2>/dev/null || echo "No log"
          echo '```'
        } >> $GITHUB_STEP_SUMMARY

    - name: Upload APK artifact
      if: steps.gradle_build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: wallpaperhub-debug-apk
        path: app/build/outputs/apk/**/*.apk
        retention-days: 90
        if-no-files-found: warn

    - name: Create GitHub Release with APK
      if: startsWith(github.ref, 'refs/tags/v') && steps.gradle_build.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/**/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
