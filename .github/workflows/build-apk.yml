name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log

    - name: Diagnose
      if: always()
      run: |
        {
          echo "=== BUILD DIAGNOSTICS ==="
          echo "Date: $(date)"
          echo "=== APK Search ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "NO_APK"
          echo "=== Build Dir ==="
          find app/build -type f 2>/dev/null | head -50 || echo "NO_BUILD_DIR"
          echo "=== Build Log (last 100 lines) ==="
          tail -100 build_output.log 2>/dev/null || echo "NO_LOG"
        } > CI_DIAGNOSTICS.txt

    - name: Commit diagnostics back
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CI_DIAGNOSTICS.txt 2>/dev/null || true
        git diff --cached --quiet || git commit -m "ci: diagnostics [skip ci]"
        git push 2>/dev/null || echo "Push skipped or failed"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: wallpaperhub-debug-apk
        path: |
          **/*.apk
        retention-days: 90
        if-no-files-found: warn

    - name: Upload APK to Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
