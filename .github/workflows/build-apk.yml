name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5 && chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Find APK and Upload to Release
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        APK=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: No APK found!"
          exit 1
        fi
        echo "Found APK: $APK"
        ls -la "$APK"
        
        # Delete old release
        gh release delete v1.0.0 -y --repo chenanz/WallpaperHub 2>/dev/null || true
        
        # Create new release with APK
        gh release create v1.0.0 "$APK" \
          --repo chenanz/WallpaperHub \
          --title "WallpaperHub v1.0.0" \
          --notes "Debug APK - first working build" \
          --target main || {
            # Fallback: upload to existing release
            gh release upload v1.0.0 "$APK" --repo chenanz/WallpaperHub --clobber
          }