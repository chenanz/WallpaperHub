name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      id: build
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log
      continue-on-error: true

    - name: Diagnose output
      if: always()
      run: |
        echo "=== Build outcome: ${{ steps.build.outcome }} ==="
        echo "=== APK files ==="
        find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "=== All build output files ==="
        find app/build/outputs -type f 2>/dev/null | head -30 || echo "No outputs dir"
        echo "=== app/build contents ==="
        find app/build -maxdepth 3 -type d 2>/dev/null | head -30 || echo "No build dir"

    - name: Post build log to issue on failure
      if: steps.build.outcome == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let log = '';
          try { log = fs.readFileSync('build_output.log', 'utf8'); } catch(e) { log = 'No log file'; }
          const lines = log.split('\n').slice(-200).join('\n');
          const body = `## ❌ Build Failed\n\n<details><summary>Last 200 lines</summary>\n\n\`\`\`\n${lines}\n\`\`\`\n</details>`;
          let issue_number;
          try {
            const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, labels: 'ci-build-log', state: 'open' });
            if (issues.data.length > 0) {
              issue_number = issues.data[0].number;
            } else {
              const created = await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: 'CI Build Log', labels: ['ci-build-log'], body: '' });
              issue_number = created.data.number;
            }
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });
          } catch(e) { console.log('Failed to post issue: ' + e.message); }

    - name: Diagnose success + post to issue
      if: steps.build.outcome == 'success'
      uses: actions/github-script@v7
      with:
        script: |
          const { execSync } = require('child_process');
          let output = '';
          try { output = execSync('find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "NO_APK"').toString(); } catch(e) { output = 'Error: ' + e.message; }
          const body = `## ✅ Build Succeeded\n\nAPK files found:\n\`\`\`\n${output}\n\`\`\``;
          try {
            let issue_number;
            const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, labels: 'ci-build-log', state: 'open' });
            if (issues.data.length > 0) {
              issue_number = issues.data[0].number;
            } else {
              const created = await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: 'CI Build Log', labels: ['ci-build-log'], body: '' });
              issue_number = created.data.number;
            }
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });
          } catch(e) { console.log('Failed to post: ' + e.message); }

    - name: Upload APK artifact
      if: steps.build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: wallpaperhub-debug-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/**/*.apk
        retention-days: 90
        if-no-files-found: warn

    - name: Upload APK to Release
      if: startsWith(github.ref, 'refs/tags/v') && steps.build.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/**/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Fail if build failed
      if: steps.build.outcome == 'failure'
      run: exit 1
