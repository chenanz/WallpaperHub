name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Install SDK components
      run: |
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Build Debug APK
      id: build
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.log
      continue-on-error: true

    - name: Post build log as issue comment on failure
      if: steps.build.outcome == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let log = '';
          try { log = fs.readFileSync('build_output.log', 'utf8'); } catch(e) { log = 'Could not read log'; }
          // Get last 200 lines
          const lines = log.split('\n').slice(-200).join('\n');
          const body = `## Build Failed\n\n\`\`\`\n${lines}\n\`\`\``;
          // Find or create an issue
          const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, labels: 'ci-build-log', state: 'open' });
          let issue_number;
          if (issues.data.length === 0) {
            const created = await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: 'CI Build Log', labels: ['ci-build-log'], body: 'Auto-created for CI build logs' });
            issue_number = created.data.number;
          } else {
            issue_number = issues.data[0].number;
          }
          await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });

    - name: Upload APK artifact
      if: steps.build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: wallpaperhub-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 90

    - name: Create GitHub Release with APK
      if: startsWith(github.ref, 'refs/tags/v') && steps.build.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Fail build if gradle failed
      if: steps.build.outcome == 'failure'
      run: exit 1
